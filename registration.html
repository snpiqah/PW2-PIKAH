<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Karnival POLYCC Mega 2026</title>
    
    <link rel="stylesheet" href="jquery.mobile-1.4.5.min.css" />
    <script src="jquery.js"></script>
    <script src="jquery.mobile-1.4.5.min.js"></script>
    
    <script src="script.js"></script>
</head>
<body>

    <div data-role="page" id="registration-page">

        <div data-role="header">
            <h1>Karnival POLYCC ...</h1>
            <div data-role="navbar">
                <ul>
                    <li><a href="#">Utama</a></li>
                    <li><a href="#">Galeri</a></li>
                    <li><a href="#" class="ui-btn-active ui-state-persist">Daftar</a></li>
                    <li><a href="#">Info</a></li>
                </ul>
            </div>
        </div>

        <div role="main" class="ui-content">
            <h2>Borang Pendaftaran</h2>
            
            <form id="regForm">
                <div class="ui-field-contain">
                    <label for="txt-nama">Nama:</label>
                    <input type="text" name="txt-nama" id="txt-nama" placeholder="Masukkan nama penuh">
                </div>

                <div class="ui-field-contain">
                    <label for="txt-umur">Umur: <span style="color:red;">*</span></label>
                    <input type="number" name="txt-umur" id="txt-umur" placeholder="Masukkan umur anda">
                </div>

                <div class="ui-field-contain">
                    <label for="txt-tarikh">Tarikh Lahir:</label>
                    <input type="date" name="txt-tarikh" id="txt-tarikh">
                </div>

                <div class="ui-field-contain">
                    <label for="select-competition" class="select">Pilihan Pertandingan:</label>
                    <select name="select-competition" id="select-competition">
                        <option value="robotics">AI Robotics Competition</option>
                        <option value="drone">Drone Competition</option>
                        <option value="cooking">Cooking Competition</option>
                        <option value="coding">Code Design Competition</option>
                        <option value="3d-art">3D Sketch / 3D Art Competition</option>
                    </select>
                </div>

                <div class="ui-field-contain">
                    <fieldset data-role="controlgroup">
                        <legend>Jantina:</legend>
                        <input type="radio" name="radio-jantina" id="radio-lelaki" value="Lelaki" checked="checked">
                        <label data-iconpos="left" for="radio-lelaki">Lelaki</label>
                        <input type="radio" name="radio-jantina" id="radio-perempuan" value="Perempuan">
                        <label data-iconpos="left" for="radio-perempuan">Perempuan</label>
                    </fieldset>
                </div>

                <button type="button" id="btn-hantar" class="ui-btn ui-corner-all ui-shadow">Hantar</button>
            </form>
        </div>

        <div data-role="footer">
            <h4>Webiture Enterprise &copy; 2026</h4>
        </div>

    </div>

</body>
</html>
