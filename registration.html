<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registration - POLYCC Mega 2026</title>

    <link rel="stylesheet" href="https://code.jquery.com/mobile/1.4.5/jquery.mobile-1.4.5.min.css" />
    <script src="https://code.jquery.com/jquery-1.11.1.min.js"></script>
    <script src="https://code.jquery.com/mobile/1.4.5/jquery.mobile-1.4.5.min.js"></script>
</head>
<body>

    <div data-role="page" id="registrationPage">

        <div data-role="header" data-theme="b">
            <h1>Karnival POLYCC ...</h1>
            <div data-role="navbar">
                <ul>
                    <li><a href="#">Utama</a></li>
                    <li><a href="#">Galeri</a></li>
                    <li><a href="#" class="ui-btn-active ui-state-persist">Daftar</a></li>
                    <li><a href="#">Info</a></li>
                </ul>
            </div>
        </div>

        <div role="main" class="ui-content">
            <h2>Borang Pendaftaran</h2>
            
            <form id="regForm">
                
                <div class="ui-field-contain">
                    <label for="nama">Nama:</label>
                    <input type="text" id="nama" name="nama" placeholder="Masukkan nama penuh" required>
                </div>

                <div class="ui-field-contain">
                    <label for="umur">Umur:</label>
                    <input type="number" id="umur" name="umur" placeholder="Masukkan umur anda" required>
                </div>

                <div class="ui-field-contain">
                    <label for="tarikhLahir">Tarikh Lahir:</label>
                    <input type="date" id="tarikhLahir" name="tarikhLahir">
                </div>

                <div class="ui-field-contain">
                    <label for="sukan" class="select">Pilih Pertandingan:</label>
                    <select id="sukan" name="sukan">
                        <option value="ai_robotics" selected>AI Robotics Competition</option>
                        <option value="drone">Drone Competition</option>
                        <option value="code_design">Code Design Competition</option>
                        <option value="cooking">Cooking Competition</option>
                        <option value="3d_art">3D Sketch / 3D Art Competition</option>
                    </select>
                </div>

                <div class="ui-field-contain">
                    <fieldset data-role="controlgroup">
                        <legend>Jantina:</legend>
                        <input type="radio" name="jantina" id="jantina-lelaki" value="Lelaki" checked="checked">
                        <label for="jantina-lelaki">Lelaki</label>
                        
                        <input type="radio" name="jantina" id="jantina-perempuan" value="Perempuan">
                        <label for="jantina-perempuan">Perempuan</label>
                    </fieldset>
                </div>

                <button type="submit" id="btnHantar" class="ui-btn ui-corner-all ui-shadow">Hantar</button>
            </form>
        </div>

        <div data-role="footer" data-position="fixed" data-theme="b">
            <h4>Komuniti Pembangun Website PTSS</h4>
        </div>

        <div data-role="popup" id="agePopup" data-overlay-theme="b" data-theme="a" data-dismissible="false" style="max-width:400px;" class="ui-corner-all">
            <div data-role="header" data-theme="a">
                <h1>Notifikasi</h1>
            </div>
            <div role="main" class="ui-content" style="text-align: center;">
                <p id="popupMessage">Mesej penapisan umur.</p>
                <a href="#" class="ui-btn ui-corner-all ui-shadow ui-btn-inline ui-btn-b" data-rel="back">Tutup</a>
            </div>
        </div>

    </div>

    <script src="script.js"></script>

</body>
</html>
